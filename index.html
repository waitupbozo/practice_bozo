<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enjoy the View</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-weight: 300;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }

        .card img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            display: block;
        }
    </style>
</head>
<body>

    <h1>Enjoy the view</h1>

    <div class="card">
        <img src="https://media1.tenor.com/m/FhOVoMvUq7EAAAAC/spongebob-grin.gif auto=format&fit=crop&w=800&q=80" alt="Landscape View">
    </div>

</body>
</html>
